<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>陈硕我爱你</title>
  <style>
    .music-controls{
  position:fixed;
  top:20px;
  right:16px;
  z-index:9999;
  display:flex;
  gap:10px;
}

.music-btn{
  width:44px;
  height:44px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.10);
  color:#fff;
  font-size:20px;
  cursor:pointer;
  backdrop-filter:blur(8px);
  box-shadow:0 0 12px rgba(255,120,180,.25);
}

.music-btn:active{
  transform:scale(0.95);
}
#photoLayer{
  position:absolute;
  inset:0;
  z-index:6;
  pointer-events:none;
  overflow:hidden;
}
.float-photo{
  position:absolute;
  width:clamp(76px, 14vw, 128px);
  aspect-ratio:3/4;
  object-fit:cover;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.42);
  box-shadow:0 16px 36px rgba(0,0,0,.34), 0 0 18px rgba(255,170,205,.16);
  opacity:0;
  filter:saturate(1.08) brightness(1.02);
  animation:photoFloat var(--dur, 10s) ease-in-out forwards;
  transform:translate3d(0,0,0) rotate(-2deg);
}
.float-photo::after{content:'';}
@keyframes photoFloat{
  0%{
    opacity:0;
    transform:translate3d(var(--x0,0px), var(--y0,0px), 0) scale(.84) rotate(var(--r0,-6deg));
  }
  12%{opacity:.94;}
  52%{
    opacity:.98;
    transform:translate3d(calc(var(--x1,0px)*.45), calc(var(--y1,0px)*.45), 0) scale(1.0) rotate(calc((var(--r0,-6deg) + var(--r1,6deg)) / 2));
  }
  100%{
    opacity:0;
    transform:translate3d(var(--x1,0px), var(--y1,0px), 0) scale(1.08) rotate(var(--r1,7deg));
  }
}

    :root{
      --pink:#ff79b0;
      --pink2:#ffc5dd;
      --rose:#ff4f92;
      --deep:#12030b;
      --glow:rgba(255,111,172,.55);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;}
    body{
      background:
        radial-gradient(circle at 50% 55%, rgba(255,84,150,.12), transparent 28%),
        radial-gradient(circle at 15% 20%, rgba(255,170,210,.08), transparent 22%),
        radial-gradient(circle at 80% 76%, rgba(255,130,180,.08), transparent 18%),
        linear-gradient(180deg,#020103 0%, #060108 35%, #000 100%);
    }
    #app{position:relative;width:100%;height:100%;overflow:hidden;}
    canvas{position:absolute;inset:0;width:100%;height:100%;}
    .ambient{position:absolute;inset:-8%;pointer-events:none;filter:blur(26px);opacity:.9;
      background:
        radial-gradient(circle at 50% 55%, rgba(255,120,182,.18), transparent 22%),
        radial-gradient(circle at 32% 52%, rgba(255,120,182,.14), transparent 18%),
        radial-gradient(circle at 68% 52%, rgba(255,120,182,.14), transparent 18%),
        radial-gradient(circle at 50% 90%, rgba(255,180,215,.12), transparent 26%);
      animation:ambient 4.4s ease-in-out infinite;
    }
    .top-words{position:absolute;inset:0;pointer-events:none;z-index:5;}
    .word{position:absolute;color:rgba(255,212,229,.72);text-shadow:0 0 10px rgba(255,130,180,.28);white-space:nowrap;user-select:none;}
    .w1{left:10%;top:18%;font-size:clamp(18px,4vw,28px);font-family:Georgia,serif;transform:rotate(-10deg);animation:driftA 9s ease-in-out infinite;}
    .w2{right:8%;top:16%;font-size:clamp(20px,4.6vw,30px);font-family:cursive;transform:rotate(8deg);animation:driftB 8s ease-in-out infinite;}
    .w3{left:14%;bottom:20%;font-size:clamp(16px,3.9vw,25px);letter-spacing:.08em;animation:driftC 8.8s ease-in-out infinite;}
    .w4{right:12%;bottom:18%;font-size:clamp(22px,5vw,34px);font-family:"Times New Roman",serif;animation:driftD 10s ease-in-out infinite;}
    .center{position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);width:min(88vw,620px);text-align:center;z-index:7;pointer-events:none;}
    .subline{display:inline-block;margin-bottom:12px;padding:8px 16px;border-radius:999px;border:1px solid rgba(255,190,220,.22);background:rgba(255,255,255,.05);backdrop-filter:blur(8px);font-size:12px;letter-spacing:.32em;color:rgba(255,228,238,.78);box-shadow:0 0 20px rgba(255,96,160,.14);}
    .main-title{margin:0;line-height:1.08;font-size:clamp(32px,9vw,68px);font-weight:800;letter-spacing:.06em;color:#ffe4ef;
      text-shadow:0 0 10px rgba(255,188,220,.92),0 0 24px rgba(255,118,178,.82),0 0 58px rgba(255,63,143,.42);
      animation:titleGlow 3.2s ease-in-out infinite;}
    .main-title .alt{display:block;margin-top:10px;font-size:clamp(26px,7vw,50px);font-family:Georgia,"Times New Roman",serif;font-style:italic;
      background:linear-gradient(90deg,#ffd9ea 0%,#fff 30%,#ffd2e8 70%,#ff9fc8 100%);
      -webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:none;filter:drop-shadow(0 0 12px rgba(255,131,190,.4));}
    .message{margin-top:16px;color:rgba(255,230,240,.86);font-size:clamp(13px,3.4vw,18px);line-height:1.7;letter-spacing:.08em;min-height:2.2em;text-shadow:0 0 10px rgba(255,111,170,.22);}   
    .bottom-ui{position:absolute;left:50%;bottom:5.8vh;transform:translateX(-50%);z-index:8;display:flex;flex-direction:column;align-items:center;gap:10px;}
    .hint{padding:10px 16px;border-radius:999px;background:rgba(255,255,255,.05);backdrop-filter:blur(8px);border:1px solid rgba(255,190,220,.24);color:rgba(255,234,242,.82);font-size:13px;letter-spacing:.08em;box-shadow:0 0 22px rgba(255,96,160,.12);animation:hint 1.9s ease-in-out infinite;}
    .mini{font-size:12px;color:rgba(255,212,228,.54);letter-spacing:.24em;}
    .tap-indicator{position:absolute;left:50%;top:74%;transform:translate(-50%,-50%);width:88px;height:88px;border-radius:50%;border:1px solid rgba(255,205,225,.22);box-shadow:0 0 24px rgba(255,111,170,.18), inset 0 0 24px rgba(255,111,170,.08);pointer-events:none;z-index:6;animation:ring 2.4s ease-out infinite;opacity:.85;}
    .intro{position:absolute;inset:0;z-index:12;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at center, rgba(28,0,13,.18), rgba(0,0,0,.94));transition:opacity .9s ease;}
    .intro.hide{opacity:0;pointer-events:none;}
    .card{width:min(88vw,420px);padding:26px 22px;border-radius:28px;border:1px solid rgba(255,189,220,.2);background:rgba(255,255,255,.06);backdrop-filter:blur(12px);box-shadow:0 0 40px rgba(255,105,170,.14);text-align:center;color:#ffe1ef;}
    .card h2{margin:0 0 8px;font-size:clamp(28px,8vw,42px);text-shadow:0 0 20px rgba(255,117,183,.35);}
    .card p{margin:8px 0 0;font-size:14px;line-height:1.8;color:rgba(255,232,241,.82);}
    .love-btn{display:inline-block;margin-top:16px;padding:11px 18px;border-radius:999px;border:1px solid rgba(255,190,220,.26);background:linear-gradient(180deg,rgba(255,144,194,.16),rgba(255,255,255,.04));box-shadow:0 0 18px rgba(255,111,170,.14);}

    @keyframes ambient{0%,100%{transform:scale(.98)}50%{transform:scale(1.03)}}
    @keyframes titleGlow{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes hint{0%,100%{opacity:.76}50%{opacity:1}}
    @keyframes ring{0%{transform:translate(-50%,-50%) scale(.86);opacity:.82}70%{opacity:.14}100%{transform:translate(-50%,-50%) scale(1.35);opacity:0}}
    @keyframes driftA{0%,100%{transform:translateY(0) rotate(-10deg)}50%{transform:translateY(-10px) rotate(-6deg)}}
    @keyframes driftB{0%,100%{transform:translateY(0) rotate(8deg)}50%{transform:translateY(-12px) rotate(3deg)}}
    @keyframes driftC{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes driftD{0%,100%{transform:translateY(0) rotate(3deg)}50%{transform:translateY(-12px) rotate(-2deg)}}
  </style>
</head>
<body>
  <div id="app">
    <canvas id="bg"></canvas>
    <canvas id="fx"></canvas>
    <div class="ambient"></div>
    <div id="photoLayer"></div>

    <div class="top-words">
      <div class="word w1">ChenShuo</div>
      <div class="word w2">硕硕~</div>
      <div class="word w3">My Dearest Love</div>
      <div class="word w4">陈硕</div>
    </div>

    <div class="center">
      <div class="subline">FOR CHENSHUO ONLY</div>
      <h1 class="main-title">陈硕 我爱你<span class="alt">ChenShuo · 硕硕~</span></h1>
      <div class="message" id="message">点一下屏幕，让所有心动都朝你奔来。</div>
    </div>

    <div class="tap-indicator"></div>

    <div class="bottom-ui">
      <div class="hint" id="hint">轻触 / 连点 / 滑动，都会触发不同的爱心互动</div>
      <div class="mini">LOVE • CHENSHUO • FOREVER</div>
    </div>

    <div class="intro" id="intro">
      <div class="card">
        <h2>♡ 陈硕 ♡</h2>
        <p>点一下，爱心会盛开。<br>再多点几下，会更浪漫一点。</p>
        <div class="love-btn">点击开始</div>
      </div>
    </div>
  </div>

  <div class="music-controls">
    <button id="switchMusicBtn" class="music-btn" title="切换音乐">🎵</button>
    <button id="muteBtn" class="music-btn" title="静音/取消静音">🔊</button>
  </div>
 <audio id="bgm" loop preload="auto"></audio>
<script>
(() => {
  const bg = document.getElementById('bg');
  const fx = document.getElementById('fx');
  const bctx = bg.getContext('2d');
  const fctx = fx.getContext('2d');
  const intro = document.getElementById('intro');
  const hint = document.getElementById('hint');
  const msg = document.getElementById('message');
  const musicList = [
  'Angel.mp3',
  'Gaobaiqiqiu.mp3',
  'Duoxingyun.mp3'
];

let currentMusicIndex = 0;
const audio = document.getElementById('bgm');
const switchMusicBtn = document.getElementById('switchMusicBtn');
const muteBtn = document.getElementById('muteBtn');
const photoLayer = document.getElementById('photoLayer');
const photoList = ['p1.jpg','p2.jpg','p3.jpg','p4.jpg'];
let introBlastDone = false;
let photoSpawner = null;
  let w=0,h=0,dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));
  let started=false, pointerDown=false;
  let rain=[], stars=[], petals=[], outline=[], halos=[], bursts=[], trails=[];

  const phrases = [
    '陈硕，我爱你。',
    'ChenShuo，你一出现，整个屏幕都变甜了。',
    '硕硕~ 今晚的心跳，想全部送给你。',
    '你站在那里，就已经是我最喜欢的风景。',
    '陈硕，所有爱心最后都会指向你。'
  ];
  let phraseIndex = 0;

  function resize(){
    w = innerWidth; h = innerHeight;
    [bg,fx].forEach(c=>{
      c.width = Math.floor(w*dpr);
      c.height = Math.floor(h*dpr);
      c.style.width = w+'px';
      c.style.height = h+'px';
    });
    bctx.setTransform(dpr,0,0,dpr,0,0);
    fctx.setTransform(dpr,0,0,dpr,0,0);
    buildBackground();
    buildHearts();
  }

  const glyphs = ['爱','L','O','V','E','U','♡','♥','陈','硕'];
  function buildBackground(){
    rain = [];
    stars = [];
    petals = [];
    const count = Math.floor((w*h)/8500);
    for(let i=0;i<count;i++){
      rain.push({
        x:Math.random()*w,
        y:Math.random()*h,
        s:12+Math.random()*20,
        a:.05+Math.random()*.18,
        v:.25+Math.random()*.9,
        drift:(Math.random()-.5)*.55,
        c:glyphs[(Math.random()*glyphs.length)|0],
        tw:Math.random()*6.28
      });
    }
    for(let i=0;i<110;i++){
      stars.push({x:Math.random()*w,y:Math.random()*h,r:.4+Math.random()*1.6,t:Math.random()*6.28,v:.01+Math.random()*.03});
    }
    for(let i=0;i<28;i++) spawnPetal(Math.random()*w, Math.random()*h, true);
  }

  function heartPoint(t, scale=1){
    const x = 16*Math.pow(Math.sin(t),3);
    const y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
    return {x:x*scale, y:-y*scale};
  }

  function buildHearts(){
    outline = [];
    halos = [];
    const base = Math.min(w,h)*0.0188;
    const centers = [
      {x:w*0.345,y:h*0.565,scale:base*1.02,alpha:.82},
      {x:w*0.655,y:h*0.565,scale:base*1.02,alpha:.82},
      {x:w*0.500,y:h*0.675,scale:base*1.18,alpha:.92}
    ];
    centers.forEach((c, idx) => {
      const total = idx===2 ? 520 : 400;
      for(let i=0;i<total;i++){
        const t = i/total*Math.PI*2;
        const p = heartPoint(t, c.scale);
        outline.push({
          homeX:c.x+p.x, homeY:c.y+p.y,
          x:c.x+(Math.random()-.5)*220,
          y:(idx===2? h+40 : -40) + Math.random()*60,
          size:(idx===2?4.8:4.2)+Math.random()*4.8,
          alpha:c.alpha*(.54+Math.random()*.52),
          speed:.015+Math.random()*.026,
          t, phase:Math.random()*6.28, group:idx
        });
      }
      halos.push({...c, pulse:Math.random()*6.28});
    });
  }

  function drawBg(time){
    bctx.clearRect(0,0,w,h);
    for(const r of rain){
      r.y += r.v;
      r.x += Math.sin(time*.00045+r.tw+r.y*.012)*r.drift;
      if(r.y > h+28){r.y = -24; r.x = Math.random()*w;}
      bctx.font = `${r.s}px sans-serif`;
      bctx.fillStyle = `rgba(255, 160, 203, ${r.a})`;
      bctx.fillText(r.c, r.x, r.y);
    }
    for(const s of stars){
      s.t += s.v;
      const a = .12 + (Math.sin(s.t)+1)/2*.42;
      bctx.beginPath();
      bctx.fillStyle = `rgba(255,235,244,${a})`;
      bctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      bctx.fill();
    }
    for(let i=petals.length-1;i>=0;i--){
      const p = petals[i];
      p.y += p.vy; p.x += p.vx + Math.sin(time*.0015+p.w)*.35; p.rot += p.spin;
      if(p.y > h+30 || p.x < -40 || p.x > w+40){ petals.splice(i,1); spawnPetal(Math.random()*w,-20,true); continue; }
      drawTinyHeart(bctx,p.x,p.y,p.s,`rgba(255,${180+p.hue},${210+p.hue*.3},${p.a})`,p.rot,false);
    }
  }

  function drawTinyHeart(ctx,x,y,size,color,rot=0,glow=true){
    ctx.save();
    ctx.translate(x,y); ctx.rotate(rot); ctx.scale(size/18,size/18);
    ctx.beginPath();
    ctx.moveTo(0,6);
    ctx.bezierCurveTo(0,-2,-12,-2,-12,6);
    ctx.bezierCurveTo(-12,12,-6,15,0,20);
    ctx.bezierCurveTo(6,15,12,12,12,6);
    ctx.bezierCurveTo(12,-2,0,-2,0,6);
    if(glow){ctx.shadowColor=color; ctx.shadowBlur=16;}
    ctx.fillStyle=color; ctx.fill();
    ctx.restore();
  }

  function drawScene(time){
    fctx.clearRect(0,0,w,h);

    halos.forEach((c, idx) => {
      const beat = 1 + Math.sin(time*.0044 + c.pulse)*.03;
      const alpha = idx===2?.16:.13;
      fctx.beginPath();
      for(let i=0;i<=260;i++){
        const t = i/260*Math.PI*2;
        const p = heartPoint(t,c.scale*beat*(idx===2?1.08:1));
        const x = c.x+p.x, y = c.y+p.y;
        i===0 ? fctx.moveTo(x,y) : fctx.lineTo(x,y);
      }
      fctx.closePath();
      fctx.strokeStyle = `rgba(255, 186, 220, ${alpha})`;
      fctx.lineWidth = idx===2?2.4:2;
      fctx.shadowBlur = 18;
      fctx.shadowColor = 'rgba(255,119,178,.38)';
      fctx.stroke();
      fctx.shadowBlur = 0;
    });

    for(const p of outline){
      p.x += (p.homeX-p.x)*p.speed;
      p.y += (p.homeY-p.y)*p.speed;
      const jx = Math.sin(time*.004 + p.phase + p.t*3)*(p.group===2?1.55:1.2);
      const jy = Math.cos(time*.0032 + p.phase + p.t*2)*(p.group===2?1.55:1.2);
      const sz = p.size + Math.sin(time*.006 + p.phase)*1.05;
      const g = p.group===2 ? 1 : .9;
      const color = `rgba(255, ${150 + Math.sin(time*.0015+p.phase)*25}, ${193 + Math.cos(p.phase)*20}, ${p.alpha*g})`;
      drawTinyHeart(fctx,p.x+jx,p.y+jy,sz,color,Math.sin(time*.0014+p.phase)*.25,true);
    }

    for(let i=trails.length-1;i>=0;i--){
      const t = trails[i];
      t.life--; t.x += t.vx; t.y += t.vy; t.vy += .01; t.a *= .985;
      drawTinyHeart(fctx,t.x,t.y,t.s,`rgba(255,180,215,${t.a})`,t.rot,false);
      if(t.life<=0 || t.a<.02) trails.splice(i,1);
    }

    for(let i=bursts.length-1;i>=0;i--){
      const b = bursts[i];
      b.life--;
      b.r += b.spread;
      b.a *= .975;
      for(let j=0;j<b.count;j++){
        const ang = (Math.PI*2/b.count)*j + b.spin;
        const x = b.x + Math.cos(ang)*b.r;
        const y = b.y + Math.sin(ang)*b.r*.82;
        drawTinyHeart(fctx,x,y,5+Math.sin(j+b.life)*2,`rgba(255,${180+(j%3)*15},${220-(j%4)*5},${b.a})`,ang*.35,false);
      }
      fctx.beginPath();
      fctx.strokeStyle = `rgba(255,206,226,${b.a*.22})`;
      fctx.lineWidth = 1.3;
      fctx.arc(b.x,b.y,b.r*0.72,0,Math.PI*2);
      fctx.stroke();
      if(b.life<=0 || b.a<.03) bursts.splice(i,1);
    }
  }

  function spawnPetal(x,y,slow=false){
    petals.push({x,y,s:4+Math.random()*8,vy:(slow?.18:.5)+Math.random()*0.8,vx:(Math.random()-.5)*.22,w:Math.random()*6.28,rot:Math.random()*6.28,spin:(Math.random()-.5)*.03,a:.16+Math.random()*.22,hue:Math.random()*35});
  }

  function makeBurst(x,y,big=false){
    bursts.push({x,y,r:2,a:.82,life:big?68:46,spread:big?1.8:1.15,count:big?22:14,spin:Math.random()*6.28});
    const n = big ? 26 : 12;
    for(let i=0;i<n;i++){
      trails.push({x,y,vx:(Math.random()-.5)*(big?3.8:2.4),vy:(Math.random()-.5)*(big?3.4:2.1),s:4+Math.random()*(big?8:5),a:.38+Math.random()*.4,life:28+Math.random()*26,rot:Math.random()*6.28});
    }
  }

  function cycleMessage(force){
    phraseIndex = (phraseIndex + 1) % phrases.length;
    msg.textContent = force || phrases[phraseIndex];
  }

  let audioCtx=null, masterGain=null, playing=false;
  function tone(freq,start,dur,type='sine',vol=.025){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq,start);
    gain.gain.setValueAtTime(.0001,start);
    gain.gain.exponentialRampToValueAtTime(vol,start+.02);
    gain.gain.exponentialRampToValueAtTime(.0001,start+dur);
    osc.connect(gain).connect(masterGain);
    osc.start(start); osc.stop(start+dur+.04);
  }
  function startMusic(){
  if (!audio) return;
  audio.src = musicList[currentMusicIndex];
  audio.loop = true;
  audio.play().catch(err => {
    console.log('播放失败:', err);
  });
}
  function switchMusic(){
  if (!audio) return;
  currentMusicIndex = (currentMusicIndex + 1) % musicList.length;
  audio.src = musicList[currentMusicIndex];
  audio.play().catch(err => {
    console.log('切换失败:', err);
  });
}

function toggleMute(){
  if (!audio) return;
  audio.muted = !audio.muted;
  muteBtn.textContent = audio.muted ? '🔇' : '🔊';
}

switchMusicBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  switchMusic();
});

muteBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  toggleMute();
});


  function makeOpeningFlowerBlast(){
    if (introBlastDone) return;
    introBlastDone = true;
    const total = Math.min(220, Math.floor((w*h)/5200) + 80);
    for(let i=0;i<total;i++){
      const ang = Math.random() * Math.PI * 2;
      const ring = 16 + Math.random() * Math.min(w,h) * 0.09;
      const spin = (Math.random() > 0.5 ? 1 : -1) * (1.8 + Math.random() * 3.2);
      const speed = 3.4 + Math.random() * 7.6;
      const size = 7 + Math.random() * 15;
      const hue = 8 + Math.random() * 42;
      const x = w * 0.5 + Math.cos(ang) * ring;
      const y = h * 0.52 + Math.sin(ang) * ring * 0.72;
      trails.push({
        x, y,
        vx: Math.cos(ang) * speed + Math.cos(ang + Math.PI/2) * spin,
        vy: Math.sin(ang) * speed * 0.78 + Math.sin(ang + Math.PI/2) * spin * 0.78,
        s: size,
        a: .5 + Math.random() * .35,
        life: 44 + Math.random() * 50,
        rot: Math.random() * Math.PI * 2
      });
    }
    for(let k=0;k<6;k++){
      setTimeout(() => makeBurst(w * (0.44 + Math.random() * 0.12), h * (0.45 + Math.random() * 0.18), true), 80 * k);
    }
  }

  function spawnPhoto(){
    if(!photoLayer || !photoList.length) return;
    const img = document.createElement('img');
    img.className = 'float-photo';
    img.src = photoList[(Math.random() * photoList.length) | 0];
    const startLeft = 8 + Math.random() * 76;      // 8% - 84%
    const startTop = 10 + Math.random() * 40;      // 10% - 50%
    const driftX = -10 + Math.random() * 20;       // vw
    const driftY = -4 - Math.random() * 18;        // vh 向上漂
    img.style.left = `${startLeft}%`;
    img.style.top = `${10 + Math.random()*40}%`;
    img.style.setProperty('--x0', `${(Math.random() - .5) * 26}px`);
    img.style.setProperty('--y0', '0px');
    img.style.setProperty('--x1', `${driftX}vw`);
    img.style.setProperty('--y1', `${driftY}vh`);
    img.style.setProperty('--r0', `${-10 + Math.random() * 20}deg`);
    img.style.setProperty('--r1', `${-14 + Math.random() * 28}deg`);
    img.style.animationDuration = `${7.8 + Math.random() * 4.4}s`;
    img.style.zIndex = `${5 + Math.floor(Math.random() * 3)}`;
    photoLayer.appendChild(img);
    const cleanup = () => img.remove();
    img.addEventListener('animationend', cleanup, { once:true });
    img.addEventListener('error', cleanup, { once:true });
  }

  function startPhotoWall(){
    if(photoSpawner) return;
    for(let i=0;i<4;i++) setTimeout(spawnPhoto, i * 260);
    photoSpawner = setInterval(() => {
      if(document.hidden) return;
      spawnPhoto();
    }, 1200);
  }

  function start(){
    if(started) return;
    started = true;
    intro.classList.add('hide');
    hint.textContent = '试试连点几下，或者拖动屏幕，会有更盛大的爱心回应';
    cycleMessage('陈硕，今晚所有的浪漫都在这里。');
    startMusic();
    makeOpeningFlowerBlast();
    startPhotoWall();
    makeBurst(w*.5,h*.56,true);
    setTimeout(()=>makeBurst(w*.5,h*.66,true),220);
  }

  window.addEventListener('pointerdown', e => {
    pointerDown = true;
    start();
    const centerDist = Math.hypot(e.clientX-w*.5, e.clientY-h*.59);
    makeBurst(e.clientX,e.clientY, centerDist < Math.min(w,h)*.18);
    if(centerDist < Math.min(w,h)*.2) cycleMessage();
  });
  window.addEventListener('pointerup', ()=> pointerDown=false);
  window.addEventListener('pointermove', e => {
    if(!pointerDown || !started) return;
    for(let i=0;i<2;i++){
      trails.push({x:e.clientX+(Math.random()-.5)*10,y:e.clientY+(Math.random()-.5)*10,vx:(Math.random()-.5)*1.6,vy:(Math.random()-.5)*1.6,s:4+Math.random()*4,a:.26+Math.random()*.24,life:18+Math.random()*12,rot:Math.random()*6.28});
    }
  });
  window.addEventListener('dblclick', e => { e.preventDefault(); makeBurst(e.clientX,e.clientY,true); cycleMessage('硕硕~ 这一下，是双倍喜欢。'); }, {passive:false});
  window.addEventListener('resize', resize);

  let lastPhrase = performance.now();
  function animate(time){
    if(time - lastPhrase > 4200 && started){ cycleMessage(); lastPhrase = time; }
    drawBg(time);
    drawScene(time);
    if(started && Math.random() < .08) spawnPetal(Math.random()*w,-10,false);
    if(started && Math.random() < 0.08){
    spawnPhoto();
  }
    requestAnimationFrame(animate);
  }

  resize();
  requestAnimationFrame(animate);
})();

</script>
</body>
</html>
